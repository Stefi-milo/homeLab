variables:
  GIT_DEPTH: 0

stages:
  - security
  - mirror

secret_scan:
  stage: security
  image: gitguardian/ggshield:v1.52.2

  rules:
    - if: '$CI_COMMIT_BRANCH'

  script:
    - ggshield secret scan repo .

mirror_to_github:
  stage: mirror
  image: alpine:3.20

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

  before_script:
    - apk add --no-cache git git-lfs
    - git lfs install --force

    - git config --global user.email "ci@gitlab.com"
    - git config --global user.name "GitLab CI"

  script:
    - git remote remove github 2>/dev/null || true
    - git remote add github https://oauth2:${GITHUB_TOKEN}@github.com/Stefi-milo/homeLab.git

    - git checkout --orphan snapshot
    - git add -A
    - git commit -m "Snapshot sync" || true

    - git push github snapshot:main --force
